<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unibancozinho</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="shortcut icon" href="media/image.png" type="image/x-icon">
</head>
<body>
    
    <main>
        <div id="container">
            <h1>ADMINISTRABANK<span id="little">little</span></h1>
            <h2>Banco Imobiliário da UNISEPE</h2>
    
            <p id="players">Selecione a quantidade de jogadores:
                <select id="playerCount">
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </p>
            <p id="initCash">
                Insira o Dinheiro Inicial: <br>
                <input type="text" id="initCashF" placeholder="Max = R$1.500.000,00" oninput="initCashF(this)" maxlength="15">
            </p>
                
            <p><button onclick="iniciarJogo()" id="eztz">INICIAR</button></p>
        </div>
    </main>
